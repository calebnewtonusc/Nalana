# ─────────────────────────────────────────────────────────────────────────────
# Nalana Nginx Configuration
#
# Features:
#   - SSL termination (Let's Encrypt / Certbot)
#   - HTTP → HTTPS redirect
#   - Reverse proxy to FastAPI on port 8000
#   - WebSocket upgrade for /v1/stream
#   - Rate limiting (10 req/s per IP, burst 30)
#   - CORS headers for browser clients (Spline-style plugins)
#   - Security headers (HSTS, CSP, X-Frame-Options)
#   - Gzip compression
#   - Grafana reverse proxy at /grafana
#
# Domain configuration:
#   Set NALANA_DOMAIN env var before starting (e.g., export NALANA_DOMAIN=api.nalana.ai)
#   docker compose uses envsubst to substitute ${NALANA_DOMAIN} at container startup.
#
# Certificate setup (run on host before starting nginx):
#   certbot certonly --standalone -d ${NALANA_DOMAIN}
#   openssl dhparam -out deploy/ssl/dhparam.pem 2048
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept       on;
    use                epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_combined;

    # ─── Performance ──────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    server_tokens       off;

    # ─── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   5;
    gzip_types
        application/json
        application/javascript
        application/x-javascript
        text/plain
        text/css
        text/javascript;

    # ─── Rate limiting ────────────────────────────────────────────────────────
    # Zone: 10 MB for ~160k IPs tracked at 10 req/s each
    limit_req_zone $binary_remote_addr zone=nalana_api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=nalana_ws:5m  rate=5r/s;
    limit_req_status 429;

    # ─── Upstream ─────────────────────────────────────────────────────────────
    upstream nalana_backend {
        server nalana-api:8000;
        keepalive 64;
    }

    upstream grafana_backend {
        server grafana:3000;
        keepalive 8;
    }

    # ─── SSL / TLS settings ───────────────────────────────────────────────────
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:20m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;
    ssl_dhparam                /etc/ssl/dhparam.pem;

    # OCSP Stapling
    ssl_stapling         on;
    ssl_stapling_verify  on;
    resolver             8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout     5s;

    # ─── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name ${NALANA_DOMAIN} www.${NALANA_DOMAIN};

        # ACME challenge (Let's Encrypt HTTP-01)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS main server ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ${NALANA_DOMAIN};

        # Certificates (managed by Certbot)
        ssl_certificate     /etc/letsencrypt/live/${NALANA_DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${NALANA_DOMAIN}/privkey.pem;

        # ─── Security headers ─────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "SAMEORIGIN"                                   always;
        add_header X-XSS-Protection          "1; mode=block"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;

        # ─── CORS headers ─────────────────────────────────────────────────────
        # Allow browser plugins (Spline, WebGL apps) to call the API
        add_header Access-Control-Allow-Origin  "*"                                 always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"               always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
        add_header Access-Control-Max-Age       "86400"                             always;

        # Pre-flight OPTIONS requests
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ─── API endpoints ────────────────────────────────────────────────────
        location /v1/ {
            # Rate limiting: allow 10 req/s with burst of 30 (queued)
            limit_req zone=nalana_api burst=30 nodelay;

            proxy_pass         http://nalana_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Timeouts — model inference can take up to 2 minutes for long plans
            proxy_connect_timeout  10s;
            proxy_read_timeout     180s;
            proxy_send_timeout     30s;

            # Buffers for large model responses
            proxy_buffer_size          16k;
            proxy_buffers              4 64k;
            proxy_busy_buffers_size    128k;
        }

        # ─── WebSocket endpoint ───────────────────────────────────────────────
        location /v1/stream {
            limit_req zone=nalana_ws burst=10 nodelay;

            proxy_pass         http://nalana_backend;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket-specific timeouts
            proxy_connect_timeout  10s;
            proxy_read_timeout     3600s;   # 1 hour — long-running sessions
            proxy_send_timeout     30s;

            # Disable proxy buffering for streaming
            proxy_buffering    off;
            proxy_cache        off;
        }

        # ─── Health check (no rate limit, no CORS, no auth) ──────────────────
        location = /v1/health {
            proxy_pass          http://nalana_backend;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            access_log          off;
        }

        # ─── Grafana dashboard (at /grafana) ──────────────────────────────────
        location /grafana/ {
            # Internal only — restrict to VPN/office IPs in production
            # allow 10.0.0.0/8;
            # deny all;

            proxy_pass         http://grafana_backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Grafana needs this for sub-path serving
            proxy_set_header   X-Grafana-Subpath "/grafana";

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        # ─── Robots.txt ───────────────────────────────────────────────────────
        location = /robots.txt {
            return 200 "User-agent: *\nDisallow: /v1/\n";
            add_header Content-Type text/plain;
        }

        # ─── 404 fallback ─────────────────────────────────────────────────────
        location / {
            return 404 '{"error": "Not found"}';
            add_header Content-Type application/json;
        }
    }
}
