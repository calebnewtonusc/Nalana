# Stage 3: Direct Preference Optimization config for Nalana
# Run: deepspeed --num_gpus=18 training/train_dpo.py --deepspeed training/ds_config.json

model:
  base_model: "Qwen/Qwen2.5-Coder-7B-Instruct"
  # Path to RL checkpoint from Stage 2
  rl_checkpoint: "./checkpoints/nalana-rl/final"
  output_dir: "./checkpoints/nalana-final"
  torch_dtype: "bfloat16"

dpo:
  beta: 0.1               # KL penalty coefficient
  learning_rate: 1.0e-6
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  max_length: 4096
  max_prompt_length: 2048
  bf16: true
  gradient_checkpointing: true
  loss_type: "sigmoid"    # Standard DPO loss

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

logging:
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
  report_to: "wandb"
  run_name: "nalana-dpo-v1"

data:
  # DPO pairs: {prompt, chosen (better Blender code), rejected (worse code)}
  # Generated by synthesis/generate_dpo_pairs.py
  dpo_pairs_path: "./data/dpo/blender_dpo_pairs.jsonl"
